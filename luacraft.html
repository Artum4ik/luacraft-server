        }
        .editorWrap {

            border: 1px solid var(--bdr);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 12px;
        }
        #editor {
            width: 100%;

        }
        .actions {

        }
        .btn {

            font-size: 13px;

            border: none;

        .btnCheck {

        .btnNext {

        .output {

    </style>

var API_URL = window.location.origin;
var progress = { lua: { done: 0 }, roblox: { done: 0 }, solar: { done: 0 } };

// Загружаем прогресс с сервера при старте
function loadProgress() {
    fetch(API_URL + '/api/progress?user_id=Artum4ik')
        .then(function(r) {
            if (!r.ok) throw new Error('Сервер ответил с ошибкой');
            return r.json();
        })
        .then(function(data) {
            console.log('✅ Прогресс загружен с сервера:', data);
            if (data.lua) progress.lua.done = data.lua;
            if (data.roblox) progress.roblox.done = data.roblox;
            if (data.solar) progress.solar.done = data.solar;
            renderTracks();
        })
        .catch(function(err) {
            console.log('❌ Сервер недоступен:', err.message);
            // Показываем сообщение и рендерим с нулевым прогрессом
            renderTracks();
            alert('⚠️ Сервер недоступен. Проверь что запущен flask_app.py на Render.\n\nАдрес: ' + API_URL);
        });
}

lessons.lua.push({
    title: 'Переменные и типы данных',
    theory: '<span class="sectionLabel">📖 Теория</span>' +
        '<h3>Что такое переменная?</h3>' +
        '<p><b>Переменная</b> — это именованная ячейка памяти компьютера. Можно представить коробку с наклейкой: на наклейке написано имя (например <code>name</code>), а внутри коробки лежит значение (например <code>"Алекс"</code>).</p>' +
        '<p>В языке Lua переменные создаются с помощью ключевого слова <code>local</code>. Это слово говорит движку Lua: «создай новую переменную, которая будет видна только внутри текущего блока кода».</p>' +
        '<p>Основные типы данных в Lua:</p>' +
        '<p><b>• string</b> — строка (текст в кавычках <code>"..."</code> или <code>\'...\'</code>)<br>' +
        '<b>• number</b> — число (целое или дробное, через точку)<br>' +
        '<b>• boolean</b> — булево (<code>true</code> или <code>false</code>)<br>' +
        '<b>• nil</b> — пустота, отсутствие значения</p>' +
        '<div class="codeBlock"><span class="cmt">-- Создаём переменные разных типов</span>\n<span class="kw">local</span> name = <span class="str">"Алекс"</span>      <span class="cmt">-- строка (текст всегда в кавычках)</span>\n<span class="kw">local</span> age = <span class="num">25</span>            <span class="cmt">-- целое число (без кавычек)</span>\n<span class="kw">local</span> height = <span class="num">1.82</span>       <span class="cmt">-- дробное число (через точку, не запятую!)</span>\n<span class="kw">local</span> isStudent = <span class="bool">true</span>    <span class="cmt">-- булево: только true (да) или false (нет)</span>\n<span class="kw">local</span> nothing = <span class="kw">nil</span>        <span class="cmt">-- nil: пусто, ничего нет</span>\n\n<span class="cmt">-- Вывод значений в консоль</span>\n<span class="func">print</span>(name)               <span class="cmt">-- покажет: Алекс</span>\n<span class="func">print</span>(<span class="str">"Возраст: "</span> .. age) <span class="cmt">-- склейка строки и числа: "Возраст: 25"</span></div>' +
        '<div class="explainBox"><div class="expTitle">🔍 Построчный разбор кода:</div>' +
        '<div class="expLine"><span class="expNum">1</span><span class="expText"><code>-- Создаём переменные</code> — это комментарий. Всё что после двух дефисов <code>--</code> Lua игнорирует. Комментарии нужны чтобы пояснять код.</span></div>' +
        '<div class="expLine"><span class="expNum">2</span><span class="expText"><code>local name = "Алекс"</code> — создаём переменную с именем <b>name</b>. <code>local</code> — команда «создать локальную переменную». Знак <code>=</code> — оператор присваивания (положить значение в переменную). <code>"Алекс"</code> — строковое значение, всегда пишется в кавычках.</span></div>' +
        '<div class="expLine"><span class="expNum">3</span><span class="expText"><code>local age = 25</code> — переменная <b>age</b> хранит число. Числа пишутся БЕЗ кавычек. Если написать <code>"25"</code> — это будет строка, а не число, и математика с ней не сработает.</span></div>' +
        '<div class="expLine"><span class="expNum">4</span><span class="expText"><code>local height = 1.82</code> — дробные числа пишутся через ТОЧКУ (не запятую!). Lua понимает и целые и дробные числа — все они имеют тип <b>number</b>.</span></div>' +
        '<div class="expLine"><span class="expNum">5</span><span class="expText"><code>local isStudent = true</code> — булев (логический) тип. Может принимать только два значения: <code>true</code> (истина, да) или <code>false</code> (ложь, нет).</span></div>' +
        '<div class="expLine"><span class="expNum">6</span><span class="expText"><code>local nothing = nil</code> — <b>nil</b> означает «ничего нет». Переменная существует, но значения у неё нет.</span></div>' +
        '<div class="expLine"><span class="expNum">9</span><span class="expText"><code>print(name)</code> — функция <b>print()</b> выводит значение в консоль. В скобках — что выводить.</span></div>' +
        '<div class="expLine"><span class="expNum">10</span><span class="expText"><code>print("Возраст: " .. age)</code> — оператор <code>..</code> (две точки) склеивает строки. Число <b>age</b> автоматически превращается в текст при склейке.</span></div>' +
        '</div>' +
        '<div class="tipBox"><strong>💡 Главный совет:</strong> Всегда используй <code>local</code> при создании переменных. Если забыть <code>local</code>, переменная станет <b>глобальной</b> — будет видна во всех файлах и функциях, а это самая частая причина багов.</div>' +
        '<div class="hintBox"><strong>⚠️ Правила имён переменных:</strong> Имя может содержать буквы (в том числе русские), цифры и знак подчёркивания <code>_</code>. Имя НЕ может начинаться с цифры. Имена чувствительны к регистру: <code>name</code> и <code>Name</code> — это ДВЕ РАЗНЫЕ переменные.</div>',
    taskTitle: '📝 Задание 1: Создай свои переменные',
    taskDesc: 'Создай три переменные с именами "имя" (строка с твоим именем), "возраст" (число), "город" (строка). Выведи их через запятую в ОДНОЙ строке с помощью функции print(). Пример вывода: «Алекс, 25, Москва»',
    criteria: ['Использовать local для всех трёх переменных', 'имя — строка в кавычках', 'возраст — число без кавычек', 'город — строка в кавычках', 'Один print(), вывод через запятую'],
    starter: '-- Создай три переменные: имя, возраст, город\n-- Затем выведи их одной строкой через запятую\n-- Пример: print(имя .. ", " .. возраст .. ", " .. город)\n',
    checks: [{ t: 'kw', kw: 'local', min: 3, msg: 'Нужно 3 local (по одному на каждую переменную)' }, { t: 'out', v: ',', msg: 'Вывод должен содержать запятые между значениями' }]
});

        '<h3>Математика в Lua</h3>' +

        '<div class="expLine"><span class="expNum">7</span><span class="expText"><code>a * b</code> — оператор <b>звёздочка</b> умножает числа. 10 × 3 = <b>30</b>.</span></div>' +
        '<div class="expLine"><span class="expNum">8</span><span class="expText"><code>a / b</code> — оператор <b>слеш</b> делит первое число на второе. <b>Важно:</b> деление ВСЕГДА возвращает дробное число. 10 / 3 = <b>3.333...</b>.</span></div>' +
        '<div class="expLine"><span class="expNum">9</span><span class="expText"><code>a % b</code> — оператор <b>процент</b> возвращает остаток от деления. 10 / 3 = 3 целых и <b>1</b> в остатке. Полезно для проверки чётности.</span></div>' +

        '<div class="codeBlock"><span class="kw">local</span> health = <span class="num">75</span>   <span class="cmt">-- здоровье игрока</span>\n\n<span class="kw">if</span> health > <span class="num">50</span> <span class="kw">then</span>\n    <span class="func">print</span>(<span class="str">"Всё отлично!"</span>)        <span class="cmt">-- если health БОЛЬШЕ 50</span>\n<span class="kw">elseif</span> health > <span class="num">20</span> <span class="kw">then</span>\n    <span class="func">print</span>(<span class="str">"Нужно подлечиться"</span>)   <span class="cmt">-- если health от 21 до 50</span>\n<span class="kw">else</span>\n    <span class="func">print</span>(<span class="str">"Критическое состояние!"</span>) <span class="cmt">-- если health 20 или меньше</span>\n<span class="kw">end</span></div>' +

lessons.lua.push({

        '<div class="expLine"><span class="expNum">1</span><span class="expText"><code>local i = 1</code> — создаём переменную-счётчик с начальным значением 1.</span></div>' +
        '<div class="expLine"><span class="expNum">3</span><span class="expText"><code>while i <= 5 do</code> — заголовок цикла. <b>while</b> — «пока». <b>i <= 5</b> — условие продолжения (i меньше или равно 5?). <b>do</b> — «делай», начало тела цикла.</span></div>' +

lessons.lua.push({

    theory: '<span class="sectionLabel">📖 Теория</span>' +
        '<h3>Ловим ошибки без падения программы</h3>' +
        '<p><code>pcall()</code> (protected call — «защищённый вызов») оборачивает вызов функции и перехватывает ошибку. Программа не крашится, даже если внутри функции произошла ошибка. Это как подушка безопасности в автомобиле.</p>' +
        '<div class="codeBlock"><span class="cmt">-- Функция которая может вызвать ошибку</span>\n<span class="kw">local</span> <span class="kw">function</span> <span class="func">danger</span>(x)\n    <span class="kw">if</span> x == <span class="num">0</span> <span class="kw">then</span>\n        <span class="func">error</span>(<span class="str">"Деление на ноль невозможно!"</span>)\n    <span class="kw">end</span>\n    <span class="kw">return</span> <span class="num">100</span> / x\n<span class="kw">end</span>\n\n<span class="cmt">-- Обычный вызов — КРАШНЕТ программу:</span>\n<span class="cmt">-- danger(0)  -- ОШИБКА! Программа остановится</span>\n\n<span class="cmt">-- Защищённый вызов через pcall</span>\n<span class="kw">local</span> ok, result = <span class="func">pcall</span>(danger, <span class="num">0</span>)\n\n<span class="kw">if</span> ok <span class="kw">then</span>\n    <span class="func">print</span>(<span class="str">"Результат: "</span> .. result)\n<span class="kw">else</span>\n    <span class="func">print</span>(<span class="str">"Ошибка перехвачена: "</span> .. result)\n<span class="kw">end</span>\n\n<span class="cmt">-- Успешный вызов (без ошибки)</span>\n<span class="kw">local</span> ok2, res2 = <span class="func">pcall</span>(danger, <span class="num">5</span>)\n<span class="func">print</span>(ok2, res2)  <span class="cmt">-- true   20</span></div>' +
        '<div class="explainBox"><div class="expTitle">🔍 Разбор:</div>' +
        '<div class="expLine"><span class="expNum">1</span><span class="expText"><code>error("сообщение")</code> — функция которая вызывает ошибку с указанным текстом. Программа останавливается.</span></div>' +
        '<div class="expLine"><span class="expNum">2</span><span class="expText"><code>pcall(функция, аргументы...)</code> — возвращает ДВА значения: <b>ok</b> (true — успешно, false — ошибка) и <b>result</b> (результат функции ИЛИ текст ошибки).</span></div>' +

        '</div>' +
        '<div class="tipBox"><strong>💡 Когда использовать pcall:</strong> При работе с файлами (вдруг файл не существует), с сетью (вдруг нет соединения), с пользовательским вводом (вдруг ввёл не число), с делением (вдруг деление на ноль).</div>',

});

        '<div class="codeBlock"><span class="cmt">-- Две обычные таблицы с числовым полем value</span>\n<span class="kw">local</span> t1 = {value = <span class="num">10</span>}\n<span class="kw">local</span> t2 = {value = <span class="num">20</span>}\n\n<span class="cmt">-- Метатаблица с методом __add (сложение)</span>\n<span class="kw">local</span> mt = {\n    __add = <span class="kw">function</span>(a, b)\n        <span class="cmt">-- Эта функция вызывается когда делаем t1 + t2</span>\n        <span class="kw">return</span> {value = a.value + b.value}\n    <span class="kw">end</span>,\n    __tostring = <span class="kw">function</span>(t)\n        <span class="cmt">-- Вызывается при print(t) или tostring(t)</span>\n        <span class="kw">return</span> <span class="str">"Таблица со значением "</span> .. t.value\n    <span class="kw">end</span>\n}\n\n<span class="cmt">-- Применяем метатаблицу к обеим таблицам</span>\n<span class="func">setmetatable</span>(t1, mt)\n<span class="func">setmetatable</span>(t2, mt)\n\n<span class="cmt">-- Теперь t1 + t2 работает!</span>\n<span class="kw">local</span> t3 = t1 + t2\n<span class="func">print</span>(t3.value)  <span class="cmt">-- 30</span>\n<span class="func">print</span>(t1)        <span class="cmt">-- "Таблица со значением 10"</span></div>' +

        lessons.lua.push({

            theory: '<span class="sectionLabel">📖 Теория</span>' +
                '<h3>Функция, которая вызывает саму себя</h3>' +
                '<p><b>Рекурсия</b> — это приём программирования, когда функция внутри своего тела вызывает саму себя. Это элегантный способ решения задач которые можно разбить на одинаковые подзадачи: вычисление факториала, обход дерева, поиск в глубину.</p>' +
                '<div class="codeBlock"><span class="cmt">-- Факториал: n! = n × (n-1) × (n-2) × ... × 1</span>\n<span class="cmt">-- 5! = 5 × 4 × 3 × 2 × 1 = 120</span>\n\n<span class="kw">function</span> <span class="func">factorial</span>(n)\n    <span class="cmt">-- БАЗОВЫЙ СЛУЧАЙ: условие выхода из рекурсии</span>\n    <span class="cmt">-- Без этого рекурсия будет бесконечной!</span>\n    <span class="kw">if</span> n <= <span class="num">1</span> <span class="kw">then</span>\n        <span class="kw">return</span> <span class="num">1</span>\n    <span class="kw">end</span>\n    <span class="cmt">-- РЕКУРСИВНЫЙ СЛУЧАЙ: вызываем себя с n-1</span>\n    <span class="kw">return</span> n * <span class="func">factorial</span>(n - <span class="num">1</span>)\n<span class="kw">end</span>\n\n<span class="func">print</span>(<span class="func">factorial</span>(<span class="num">5</span>))  <span class="cmt">-- 120</span>\n<span class="func">print</span>(<span class="func">factorial</span>(<span class="num">6</span>))  <span class="cmt">-- 720</span>\n\n<span class="cmt">-- Как это работает для factorial(3):</span>\n<span class="cmt">-- factorial(3) = 3 * factorial(2)</span>\n<span class="cmt">-- factorial(2) = 2 * factorial(1)</span>\n<span class="cmt">-- factorial(1) = 1 (базовый случай!)</span>\n<span class="cmt">-- Поднимаемся обратно: 2*1=2, 3*2=6</span></div>' +

                '<div class="tipBox"><strong>🚀 Что дальше:</strong> Ты освоил базу Lua! Теперь можно переходить к созданию игр — треки Roblox Luau и Solar2D научат тебя применять эти знания на практике в реальных игровых движках.</div>',
            taskTitle: '📝 Задание 20: Финальный проект Lua',
            taskDesc: 'Создай таблицу ops с ЧЕТЫРЬМЯ функциями: add (сложение), sub (вычитание), mul (умножение), div (деление). Каждая принимает два числа и возвращает результат. Вызови все четыре с аргументами 12 и 4. Выведи каждый результат.',
            criteria: ['Таблица ops', 'Функции add, sub, mul, div', 'Вызов с 12 и 4', 'Вывод всех 4 результатов'],
            starter: '-- Создай таблицу ops\n-- Добавь функции add, sub, mul, div\n-- Вызови каждую с 12 и 4 и выведи результат\n',
            checks: [{ t: 'code', v: 'add', msg: 'Нужна функция add' }, { t: 'code', v: 'div', msg: 'Нужна функция div' }, { t: 'out', v: '16', msg: '12+4=16' }, { t: 'out', v: '3', msg: '12/4=3' }]
        });

        // ==================== ROBLOX + SOLAR (заглушки) ====================
        for (var i = 1; i <= 25; i++) {
            lessons.roblox.push({
                title: 'Урок Roblox #' + i,
                theory: '<h3>Содержание урока ' + i + '</h3><p>Материал готовится...</p>',
                taskTitle: 'Задание ' + i,
                taskDesc: 'Выполни задание.',
                criteria: [],
                starter: '-- Твой код\n',
                checks: []
            });
        }
        for (var i = 1; i <= 22; i++) {
            lessons.solar.push({
                title: 'Урок Solar2D #' + i,
                theory: '<h3>Содержание урока ' + i + '</h3><p>Материал готовится...</p>',
                taskTitle: 'Задание ' + i,
                taskDesc: 'Выполни задание.',
                criteria: [],
                starter: '-- Твой код\n',
                checks: []
            });
        }

        // ==================== ЛОГИКА ПРИЛОЖЕНИЯ ====================
        var curTrack = null, curIdx = 0, editor = null, passed = false;
        var scrollEl = $('scrollContent');

        function renderTracks() {
            var h = '';
            for (var i = 0; i < tracks.length; i++) {
                var t = tracks[i];
                var d = progress[t.id].done;
                var pct = t.total > 0 ? Math.round((d / t.total) * 100) : 0;
                h += '<div class="trackCard" data-id="' + t.id + '"><div class="icon">' + t.icon + '</div><div class="title">' + t.title + '</div><div class="desc">' + t.desc + '</div><div class="prog"><span>' + d + '/' + t.total + '</span><div class="progBar"><div class="progFill ' + t.color + '" style="width:' + pct + '%"></div></div><span>' + pct + '%</span></div></div>';
            }
            $('tracksContainer').innerHTML = h;
            document.querySelectorAll('.trackCard').forEach(function(c) {
                c.addEventListener('click', function() { openTrack(this.dataset.id); });
            });
        }

        function openTrack(id) {
            curTrack = id;
            curIdx = progress[id].done;
            if (curIdx >= lessons[id].length) curIdx = 0;
            passed = false;
            $('mainScreen').classList.add('hidden');
            $('lessonScreen').classList.remove('hidden');
            loadLesson();
            setTimeout(function() { if (editor) editor.layout(); }, 300);
            scrollEl.scrollTop = 0;
        }

        function goBack() {
            curTrack = null;
            $('lessonScreen').classList.add('hidden');
            $('mainScreen').classList.remove('hidden');
            renderTracks();
        }
        $('btnBack').addEventListener('click', goBack);

        function loadLesson() {
            var ls = lessons[curTrack];
            if (!ls || ls.length === 0) return;
            if (curIdx >= ls.length) curIdx = ls.length - 1;
            var l = ls[curIdx];
            passed = false;
            var tr = tracks.find(function(t) { return t.id === curTrack; });
            $('lessonName').textContent = (tr ? tr.title : '') + ' — ' + l.title;
            $('lessonNum').textContent = (curIdx + 1) + ' / ' + ls.length;
            $('theorySection').innerHTML = l.theory;
            $('tTitle').textContent = l.taskTitle;
            $('tDesc').textContent = l.taskDesc;
            $('tCriteria').innerHTML = (l.criteria || []).map(function(c) { return '<span class="critBadge">✅ ' + c + '</span>'; }).join('');
            $('output').innerHTML = '🟢 Урок загружен. Напиши код и нажми «Запустить».';
            $('btnNext').disabled = true;
            $('btnNext').textContent = 'Далее →';
            if (editor) { editor.setValue(l.starter || '-- Твой код\n'); }
            scrollEl.scrollTop = 0;
            setTimeout(function() { scrollEl.scrollTop = 0; }, 100);
            if (curIdx > progress[curTrack].done) {
                progress[curTrack].done = curIdx;
                saveProgress();
            }
        }

        function initEditor(code) {
            if (editor) { editor.dispose(); editor = null; }
            editor = monaco.editor.create($('editor'), {
                value: code || '', language: 'lua', theme: 'vs-dark', fontSize: 14,
                fontFamily: "'Consolas','Courier New',monospace", minimap: { enabled: false },
                lineNumbers: 'on', scrollBeyondLastLine: false, automaticLayout: true, tabSize: 4, wordWrap: 'on'
            });
        }

        function executeCode(code) {
            var prints = [], errors = [];
            try {
                var js = code.replace(/--.*$/gm, '');
                var strings = [];
                js = js.replace(/"[^"]*"/g, function(m) { strings.push(m); return '❝' + (strings.length - 1) + '❞'; });
                js = js.replace(/'[^']*'/g, function(m) { strings.push(m); return '❝' + (strings.length - 1) + '❞'; });
                js = js.replace(/\blocal\s+(\w+)/g, 'var $1');
                var output = [];
                js = js.replace(/\bprint\s*\(/g, 'output.push(');
                js = js.replace(/\bif\s+(.+?)\s+then\b/g, 'if($1){');
                js = js.replace(/\belseif\s+(.+?)\s+then\b/g, '}else if($1){');
                js = js.replace(/\belse\b(?!\s*if)/g, '}else{');
                js = js.replace(/\bend\b/g, '}');
                js = js.replace(/~=/g, '!==');
                js = js.replace(/\.\./g, '+');
                for (var i = 0; i < strings.length; i++) { js = js.replace('❝' + i + '❞', strings[i]); }
                eval(js);
                for (var i = 0; i < output.length; i++) { prints.push(String(output[i])); }
            } catch (e) { errors.push('Ошибка: ' + e.message); }
            return { prints: prints, errors: errors };
        }

        function checkTask(code) {
            var l = lessons[curTrack][curIdx];
            if (!l || !l.checks) return { allOk: true, res: [] };
            var res = [];
            for (var i = 0; i < l.checks.length; i++) {
                var c = l.checks[i];
                if (c.t === 'kw') {
                    var re = new RegExp('\\b' + c.kw + '\\b', 'gi');
                    var m = code.match(re);
                    var cnt = m ? m.length : 0;
                    res.push({ ok: cnt >= c.min, msg: (cnt >= c.min ? '✅ ' : '❌ ') + c.msg + ' (' + cnt + ')' });
                } else if (c.t === 'out') {
                    var r = executeCode(code);
                    var all = r.prints.join(' ');
                    res.push({ ok: all.indexOf(c.v) !== -1, msg: (all.indexOf(c.v) !== -1 ? '✅ ' : '❌ ') + c.msg });
                } else if (c.t === 'code') {
                    res.push({ ok: code.indexOf(c.v) !== -1, msg: (code.indexOf(c.v) !== -1 ? '✅ ' : '❌ ') + c.msg });
                }
            }
            return { allOk: res.every(function(r) { return r.ok; }), res: res };
        }

        $('btnRun').addEventListener('click', function() {
            if (!editor) return;
            var r = executeCode(editor.getValue());
            var h = '';
            r.errors.forEach(function(e) { h += '<span class="outErr">' + e + '</span><br>'; });
            r.prints.forEach(function(p) { h += p + '<br>'; });
            $('output').innerHTML = h || '<span class="outInfo">✅ Код выполнен, вывода нет.</span>';
        });

        $('btnCheck').addEventListener('click', function() {
            if (!editor) return;
            var r = checkTask(editor.getValue());
            var h = '<span class="outHead">🔍 Результаты проверки:</span><br>';
            r.res.forEach(function(x) { h += '<span class="' + (x.ok ? 'outOk' : 'outErr') + '">' + x.msg + '</span><br>'; });
            if (r.allOk) {
                h += '<br><span class="outOk outBig">🎉 Все проверки пройдены! Отличная работа!</span>';
                passed = true;
                $('btnNext').disabled = false;
                var done = curIdx + 1;
                if (done > progress[curTrack].done) { progress[curTrack].done = done;
                    saveProgress(); }
            } else {
                h += '<br><span class="outWarn">⚠ Некоторые проверки не пройдены. Исправь код и попробуй снова.</span>';
                passed = false;
                $('btnNext').disabled = true;
            }
            $('output').innerHTML = h;
        });

        $('btnReset').addEventListener('click', function() {
            if (!editor || !curTrack) return;
            editor.setValue(lessons[curTrack][curIdx].starter || '-- Твой код\n');
            $('output').innerHTML = '🔄 Код сброшен. Напиши своё решение.';
            passed = false;
            $('btnNext').disabled = true;
        });

        $('btnNext').addEventListener('click', function() {
            if (!passed) return;
            var ls = lessons[curTrack];
            if (curIdx < ls.length - 1) { curIdx++;
                loadLesson(); } else {
                $('output').innerHTML = '<span class="outOk outBig">🏆 Поздравляем! Трек полностью пройден!</span>';
                $('btnNext').textContent = '🏁 Завершено';
                $('btnNext').disabled = true;
                setTimeout(goBack, 2000);
            }
        });

        document.addEventListener('keydown', function(e) {
            if ($('lessonScreen').classList.contains('hidden')) return;
            if (e.ctrlKey && e.key === 'Enter') { e.preventDefault();
                $('btnRun').click(); }
            if (e.ctrlKey && e.shiftKey && e.key === 'Enter') { e.preventDefault();
                $('btnCheck').click(); }
            if (e.key === 'Escape') goBack();
        });

        initEditor('-- Напиши свой код здесь\n');
        renderTracks();
        console.log('🚀 LuaCraft готов! 20 уроков Lua + Roblox + Solar2D');
        console.log('⌨️ Ctrl+Enter = Запустить | Ctrl+Shift+Enter = Проверить | Esc = Назад');

    });
    </script>
</body>
</html>
